<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <defs>
    <!-- Chrome metallic gradient (8-stop for realism) -->
    <linearGradient id="chrome" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#94A3B8"/>
      <stop offset="15%" stop-color="#E2E8F0"/>
      <stop offset="30%" stop-color="#F8FAFC"/>
      <stop offset="45%" stop-color="#CBD5E1"/>
      <stop offset="55%" stop-color="#E2E8F0"/>
      <stop offset="70%" stop-color="#F1F5F9"/>
      <stop offset="85%" stop-color="#CBD5E1"/>
      <stop offset="100%" stop-color="#94A3B8"/>
    </linearGradient>
    <!-- Blue accent gradient -->
    <linearGradient id="blueAccent" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#60A5FA"/>
      <stop offset="50%" stop-color="#3B82F6"/>
      <stop offset="100%" stop-color="#2563EB"/>
    </linearGradient>
    <!-- Droplet gradient -->
    <linearGradient id="droplet" x1="30%" y1="0%" x2="70%" y2="100%">
      <stop offset="0%" stop-color="#93C5FD"/>
      <stop offset="40%" stop-color="#60A5FA"/>
      <stop offset="100%" stop-color="#2563EB"/>
    </linearGradient>
    <!-- Shine highlight -->
    <linearGradient id="shine" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="white" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </linearGradient>
    <!-- Shield fill -->
    <linearGradient id="shieldFill" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#0F1D32"/>
      <stop offset="100%" stop-color="#080E1B"/>
    </linearGradient>
    <filter id="innerGlow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Shield shape (automotive heritage) -->
  <path d="M60,6 L108,28 L108,68 Q108,96 60,114 Q12,96 12,68 L12,28 Z"
        fill="url(#shieldFill)" stroke="url(#chrome)" stroke-width="2.5"/>
  <!-- Inner shield border -->
  <path d="M60,14 L102,33 L102,67 Q102,90 60,106 Q18,90 18,67 L18,33 Z"
        fill="none" stroke="url(#chrome)" stroke-width="0.5" opacity="0.25"/>

  <!-- Stylized water droplet (center) -->
  <g transform="translate(60, 52)" filter="url(#innerGlow)">
    <!-- Main droplet -->
    <path d="M0,-28 Q-3,-20 -14,-4 Q-22,8 -22,16 Q-22,30 0,30 Q22,30 22,16 Q22,8 14,-4 Q3,-20 0,-28 Z"
          fill="url(#droplet)" opacity="0.9"/>
    <!-- Chrome shine streak across droplet -->
    <path d="M-12,2 Q-4,-8 0,-10 Q4,-8 8,0 Q4,8 0,12 Q-6,6 -12,2 Z"
          fill="url(#shine)" opacity="0.6"/>
    <!-- Small highlight dot -->
    <circle cx="-6" cy="-6" r="3" fill="white" opacity="0.7"/>
    <circle cx="-6" cy="-6" r="1.5" fill="white" opacity="0.9"/>
  </g>

  <!-- Horizontal chrome line divider -->
  <line x1="28" y1="88" x2="92" y2="88" stroke="url(#chrome)" stroke-width="0.6" opacity="0.4"/>

  <!-- GLOSS text -->
  <text x="60" y="102" fill="url(#chrome)" text-anchor="middle"
        font-family="'Bodoni Moda', 'Didot', Georgia, serif"
        font-size="13" font-weight="700" letter-spacing="5">GLOSS</text>
</svg>
