<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <defs>
    <!-- Premium dark background gradient -->
    <radialGradient id="dropBg" cx="45%" cy="35%" r="55%">
      <stop offset="0%" stop-color="#E8F4FF"/>
      <stop offset="30%" stop-color="#B8D8F8"/>
      <stop offset="60%" stop-color="#6BA3D6"/>
      <stop offset="100%" stop-color="#1A5276"/>
    </radialGradient>
    <!-- Glossy highlight -->
    <radialGradient id="highlight" cx="35%" cy="25%" r="30%">
      <stop offset="0%" stop-color="white" stop-opacity="0.95"/>
      <stop offset="50%" stop-color="white" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </radialGradient>
    <!-- Secondary highlight -->
    <radialGradient id="highlight2" cx="60%" cy="70%" r="20%">
      <stop offset="0%" stop-color="white" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </radialGradient>
    <!-- Car reflection gradient -->
    <linearGradient id="carGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0A2540" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#1A5276" stop-opacity="0.3"/>
    </linearGradient>
    <!-- Outer glow -->
    <filter id="dropShadow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <!-- Inner shadow for depth -->
    <filter id="innerDepth">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <!-- Clip path for droplet shape -->
    <clipPath id="dropClip">
      <path d="M60,8 Q60,8 42,42 C28,64 28,78 60,108 C92,78 92,64 78,42 Q60,8 60,8 Z"/>
    </clipPath>
  </defs>

  <!-- === WATER DROPLET === -->
  <!-- Drop shadow on surface -->
  <ellipse cx="60" cy="112" rx="18" ry="4" fill="#1A5276" opacity="0.15"/>

  <!-- Main droplet body -->
  <path d="M60,8 Q60,8 42,42 C28,64 28,78 60,108 C92,78 92,64 78,42 Q60,8 60,8 Z"
        fill="url(#dropBg)" filter="url(#dropShadow)"/>

  <!-- Thin edge ring for glass-like feel -->
  <path d="M60,8 Q60,8 42,42 C28,64 28,78 60,108 C92,78 92,64 78,42 Q60,8 60,8 Z"
        fill="none" stroke="white" stroke-width="0.8" opacity="0.3"/>

  <!-- === CAR SILHOUETTE REFLECTED INSIDE === -->
  <g clip-path="url(#dropClip)" opacity="0.55">
    <!-- Horizon line inside droplet -->
    <line x1="30" y1="72" x2="90" y2="72" stroke="#0A2540" stroke-width="0.5" opacity="0.3"/>

    <!-- Sports car silhouette - low, sleek, unmistakable -->
    <g transform="translate(60, 72) scale(0.85)" filter="url(#innerDepth)">
      <!-- Car body -->
      <path d="M-26,0 L-24,-2 L-18,-3 L-12,-3 L-8,-10 L-2,-12 L8,-12 L16,-10 L20,-4 L24,-3 L26,-2 L26,0 Z"
            fill="#0A2540" opacity="0.7"/>
      <!-- Windshield -->
      <path d="M-6,-10 L-2,-12 L8,-12 L12,-10 Z"
            fill="#3B82F6" opacity="0.3"/>
      <!-- Front wheel -->
      <circle cx="-16" cy="0" r="4" fill="#0A2540" opacity="0.6"/>
      <circle cx="-16" cy="0" r="2" fill="#1A5276" opacity="0.4"/>
      <!-- Rear wheel -->
      <circle cx="18" cy="0" r="4" fill="#0A2540" opacity="0.6"/>
      <circle cx="18" cy="0" r="2" fill="#1A5276" opacity="0.4"/>
      <!-- Ground reflection -->
      <path d="M-26,0 L-24,2 L-18,3 L-12,3 L-8,6 L-2,7 L8,7 L16,6 L20,3 L24,3 L26,2 L26,0 Z"
            fill="#0A2540" opacity="0.12"/>
    </g>
  </g>

  <!-- === GLOSSY HIGHLIGHTS (on top of everything) === -->
  <!-- Primary highlight - top left -->
  <ellipse cx="48" cy="34" rx="14" ry="18" fill="url(#highlight)" transform="rotate(-15, 48, 34)"/>
  <!-- Small sharp highlight -->
  <ellipse cx="44" cy="28" rx="4" ry="6" fill="white" opacity="0.7" transform="rotate(-15, 44, 28)"/>
  <!-- Bottom-right secondary highlight -->
  <ellipse cx="68" cy="85" rx="8" ry="6" fill="url(#highlight2)"/>
</svg>