<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <defs>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3B82F6"/>
      <stop offset="100%" stop-color="#60A5FA"/>
    </linearGradient>
  </defs>

  <!-- G monogram - clean, bold -->
  <g transform="translate(60, 52)">
    <!-- Circle arc (open G shape) -->
    <path d="M6,-44 A44,44 0 1,0 6,44" fill="none" stroke="url(#accentGrad)" stroke-width="6" stroke-linecap="round"/>
    <!-- Crossbar -->
    <line x1="6" y1="0" x2="28" y2="0" stroke="url(#accentGrad)" stroke-width="6" stroke-linecap="round"/>
    <!-- Shine accent -->
    <circle cx="32" cy="-32" r="3.5" fill="#60A5FA" opacity="0.6"/>
    <circle cx="32" cy="-32" r="1.5" fill="white" opacity="0.9"/>
  </g>

  <!-- GLOSS text below -->
  <text x="60" y="112" fill="white" text-anchor="middle"
        font-family="'Jost', 'Helvetica Neue', Arial, sans-serif"
        font-size="14" font-weight="600" letter-spacing="6">GLOSS</text>
</svg>
