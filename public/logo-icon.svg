<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="glGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#60A5FA"/>
      <stop offset="40%" stop-color="#3B82F6"/>
      <stop offset="100%" stop-color="#2563EB"/>
    </linearGradient>
    <linearGradient id="chromeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E2E8F0"/>
      <stop offset="50%" stop-color="#F1F5F9"/>
      <stop offset="100%" stop-color="#94A3B8"/>
    </linearGradient>
    <filter id="glow" x="-15%" y="-15%" width="130%" height="130%">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <g transform="translate(50, 50)" filter="url(#glow)">
    <!-- Outer hex frame -->
    <path d="M0,-40 L35,-20 L35,20 L0,40 L-35,20 L-35,-20 Z"
          fill="none" stroke="url(#glGrad)" stroke-width="1.5" opacity="0.5"/>
    <!-- Inner hex -->
    <path d="M0,-28 L24,-14 L24,14 L0,28 L-24,14 L-24,-14 Z"
          fill="none" stroke="url(#glGrad)" stroke-width="0.8" opacity="0.2"/>

    <!-- G -->
    <text x="-13" y="8" fill="url(#glGrad)"
          font-family="'Bodoni Moda', 'Didot', Georgia, serif"
          font-size="34" font-weight="700" letter-spacing="-2">G</text>
    <!-- L -->
    <text x="5" y="8" fill="url(#chromeGrad)"
          font-family="'Bodoni Moda', 'Didot', Georgia, serif"
          font-size="34" font-weight="400" letter-spacing="-2">L</text>

    <!-- Accent dot -->
    <circle cx="26" cy="-26" r="2" fill="#60A5FA" opacity="0.8"/>
    <circle cx="26" cy="-26" r="3.5" fill="#60A5FA" opacity="0.15"/>
  </g>
</svg>
