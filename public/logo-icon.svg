<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <defs>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3B82F6"/>
      <stop offset="100%" stop-color="#60A5FA"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F1F5F9"/>
      <stop offset="100%" stop-color="#CBD5E1"/>
    </linearGradient>
    <linearGradient id="dropGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#93C5FD"/>
      <stop offset="100%" stop-color="#3B82F6"/>
    </linearGradient>
  </defs>

  <!-- Hexagonal badge shape -->
  <polygon points="60,4 110,30 110,90 60,116 10,90 10,30"
           fill="#0D1929" stroke="url(#accentGrad)" stroke-width="2"/>
  <polygon points="60,10 105,33 105,87 60,110 15,87 15,33"
           fill="none" stroke="url(#accentGrad)" stroke-width="0.5" opacity="0.3"/>

  <!-- GL monogram -->
  <text x="60" y="72" fill="url(#textGrad)" text-anchor="middle"
        font-family="'Bodoni Moda', 'Didot', Georgia, serif"
        font-size="48" font-weight="700" letter-spacing="2">GL</text>

  <!-- Water drop accent -->
  <path d="M88,22 Q90,17 92,22 Q92,25.5 90,26.5 Q88,25.5 88,22 Z" fill="url(#dropGrad)" opacity="0.7"/>

  <!-- Shine sparkle -->
  <circle cx="92" cy="18" r="1.5" fill="white" opacity="0.6"/>

  <!-- Subtle tagline -->
  <text x="60" y="92" fill="url(#accentGrad)" text-anchor="middle"
        font-family="'Jost', sans-serif"
        font-size="7" font-weight="300" letter-spacing="4">AUTO</text>
</svg>
