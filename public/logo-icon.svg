<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0D1929"/>
      <stop offset="100%" stop-color="#060E1A"/>
    </linearGradient>
    <linearGradient id="carGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#2563EB"/>
      <stop offset="30%" stop-color="#3B82F6"/>
      <stop offset="50%" stop-color="#93C5FD"/>
      <stop offset="70%" stop-color="#3B82F6"/>
      <stop offset="100%" stop-color="#2563EB"/>
    </linearGradient>
    <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3B82F6"/>
      <stop offset="50%" stop-color="#60A5FA"/>
      <stop offset="100%" stop-color="#2563EB"/>
    </linearGradient>
    <linearGradient id="shineGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#93C5FD" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#3B82F6" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="dropGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#93C5FD"/>
      <stop offset="100%" stop-color="#3B82F6"/>
    </linearGradient>
    <filter id="carGlow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="dropShadow">
      <feDropShadow dx="0" dy="1" stdDeviation="1" flood-color="#3B82F6" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Outer decorative ring -->
  <circle cx="100" cy="100" r="97" fill="none" stroke="url(#ringGrad)" stroke-width="1" opacity="0.3"/>
  <!-- Main border ring -->
  <circle cx="100" cy="100" r="94" fill="none" stroke="url(#ringGrad)" stroke-width="2.5" opacity="0.7"/>
  <!-- Inner border ring -->
  <circle cx="100" cy="100" r="90" fill="none" stroke="url(#ringGrad)" stroke-width="0.5" opacity="0.4"/>

  <!-- Dark background -->
  <circle cx="100" cy="100" r="89" fill="url(#bgGrad)"/>

  <!-- Ambient light from above -->
  <ellipse cx="100" cy="55" rx="55" ry="40" fill="url(#shineGrad)" opacity="0.15"/>

  <!-- Detailed sports car silhouette (GT/coupe profile) -->
  <g transform="translate(100, 75)" filter="url(#carGlow)">
    <!-- Body - more detailed GT coupe shape -->
    <path d="M-50,6 L-47,5 L-44,3 L-40,-1 L-36,-5 L-30,-10 L-22,-14 L-14,-17 L-6,-18.5 L4,-18.5 L14,-17 L22,-14 L28,-10 L33,-5 L37,-1 L40,1 L44,3 L48,4 L50,5 L50,8 L48,9 L42,9 L38,9 L34,5 L30,5 L26,9 L-6,9 L-10,5 L-14,5 L-18,9 L-24,9 L-30,9 L-48,9 L-50,8 Z"
          fill="url(#carGrad)" opacity="0.95"/>
    <!-- Roof line -->
    <path d="M-18,-14 L-10,-17 L4,-18 L14,-17 L22,-14 L26,-10 L-24,-10 Z"
          fill="#1E40AF" opacity="0.3"/>
    <!-- Windshield -->
    <path d="M-18,-13 L-8,-16.5 L6,-16.5 L16,-13 L22,-8 L-24,-8 Z"
          fill="#60A5FA" opacity="0.2"/>
    <!-- Side window -->
    <path d="M-24,-8 L-30,-4 L-32,-1 L-24,-1 Z"
          fill="#60A5FA" opacity="0.12"/>
    <!-- Rear window -->
    <path d="M22,-8 L28,-4 L30,-1 L22,-1 Z"
          fill="#60A5FA" opacity="0.1"/>
    <!-- Body line accent -->
    <path d="M-44,2 L-30,-2 L0,-4 L30,-2 L44,2"
          fill="none" stroke="#93C5FD" stroke-width="0.4" opacity="0.4"/>
    <!-- Front wheel -->
    <circle cx="-14" cy="8" r="7" fill="#060E1A" stroke="#60A5FA" stroke-width="0.8" opacity="0.9"/>
    <circle cx="-14" cy="8" r="4.5" fill="none" stroke="#3B82F6" stroke-width="0.4" opacity="0.5"/>
    <circle cx="-14" cy="8" r="2" fill="#1E3A5F"/>
    <!-- Rear wheel -->
    <circle cx="30" cy="8" r="7" fill="#060E1A" stroke="#60A5FA" stroke-width="0.8" opacity="0.9"/>
    <circle cx="30" cy="8" r="4.5" fill="none" stroke="#3B82F6" stroke-width="0.4" opacity="0.5"/>
    <circle cx="30" cy="8" r="2" fill="#1E3A5F"/>
    <!-- Headlight -->
    <ellipse cx="-46" cy="4" rx="3.5" ry="1.5" fill="#93C5FD" opacity="0.7"/>
    <ellipse cx="-46" cy="4" rx="2" ry="0.8" fill="white" opacity="0.4"/>
    <!-- Taillight -->
    <rect x="46" y="3" width="4" height="2.5" rx="1" fill="#EF4444" opacity="0.8"/>
    <rect x="47" y="3.5" width="2" height="1.5" rx="0.5" fill="#F87171" opacity="0.5"/>
  </g>

  <!-- Water droplets (detailing theme) -->
  <g filter="url(#softGlow)">
    <!-- Drop 1 -->
    <path d="M148,48 Q150,42 152,48 Q152,52 150,53 Q148,52 148,48 Z" fill="url(#dropGrad)" opacity="0.6"/>
    <!-- Drop 2 -->
    <path d="M155,62 Q156,59 157,62 Q157,64 156,64.5 Q155,64 155,62 Z" fill="url(#dropGrad)" opacity="0.4"/>
    <!-- Drop 3 -->
    <path d="M42,56 Q43.5,52 45,56 Q45,58.5 43.5,59 Q42,58.5 42,56 Z" fill="url(#dropGrad)" opacity="0.5"/>
  </g>

  <!-- Sparkle/shine marks -->
  <g opacity="0.5">
    <line x1="158" y1="38" x2="162" y2="34" stroke="#93C5FD" stroke-width="0.8" stroke-linecap="round"/>
    <line x1="156" y1="34" x2="164" y2="38" stroke="#93C5FD" stroke-width="0.8" stroke-linecap="round"/>
    <circle cx="160" cy="36" r="0.8" fill="white" opacity="0.8"/>
  </g>
  <g opacity="0.3">
    <line x1="36" y1="42" x2="39" y2="39" stroke="#93C5FD" stroke-width="0.6" stroke-linecap="round"/>
    <line x1="35" y1="39" x2="40" y2="42" stroke="#93C5FD" stroke-width="0.6" stroke-linecap="round"/>
  </g>

  <!-- GLOSS text -->
  <text x="100" y="118" fill="white" text-anchor="middle"
        font-family="'Jost', 'Helvetica Neue', Arial, sans-serif"
        font-size="26" font-weight="800" letter-spacing="8" filter="url(#dropShadow)">GLOSS</text>

  <!-- Decorative line between text -->
  <line x1="55" y1="125" x2="145" y2="125" stroke="url(#ringGrad)" stroke-width="0.6" opacity="0.4"/>

  <!-- LABS text -->
  <text x="100" y="142" fill="url(#ringGrad)" text-anchor="middle"
        font-family="'Jost', 'Helvetica Neue', Arial, sans-serif"
        font-size="18" font-weight="300" letter-spacing="12">LABS</text>

  <!-- Subtle tagline arc -->
  <text x="100" y="162" fill="#60A5FA" text-anchor="middle" opacity="0.3"
        font-family="'Jost', 'Helvetica Neue', Arial, sans-serif"
        font-size="5" font-weight="300" letter-spacing="3">AUTO DETAILING</text>

  <!-- Top shine arc -->
  <path d="M45,25 Q100,10 155,25" fill="none" stroke="white" stroke-width="0.5" opacity="0.08"/>
</svg>
