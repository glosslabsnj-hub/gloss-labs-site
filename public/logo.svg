<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 180" width="640" height="180">
  <defs>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e8d48b"/>
      <stop offset="35%" stop-color="#c9a84c"/>
      <stop offset="65%" stop-color="#b8943e"/>
      <stop offset="100%" stop-color="#dfc06a"/>
    </linearGradient>
    <linearGradient id="goldVert" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#e8d48b"/>
      <stop offset="50%" stop-color="#c9a84c"/>
      <stop offset="100%" stop-color="#b8943e"/>
    </linearGradient>
    <linearGradient id="shine" x1="30%" y1="0%" x2="70%" y2="100%">
      <stop offset="0%" stop-color="#f5ecc8" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#c9a84c" stop-opacity="0.15"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- === ICON: Elegant water droplet with sparkle === -->
  <g transform="translate(58, 90)" filter="url(#glow)">
    <!-- Outer droplet silhouette -->
    <path d="M0,-54 C4,-54 8,-52 12,-46 C22,-30 30,-14 30,4 C30,22 16,38 0,38 C-16,38 -30,22 -30,4 C-30,-14 -22,-30 -12,-46 C-8,-52 -4,-54 0,-54 Z"
          fill="none" stroke="url(#gold)" stroke-width="2"/>

    <!-- Inner fill with low opacity for depth -->
    <path d="M0,-40 C3,-40 6,-38 9,-33 C17,-20 22,-8 22,4 C22,16 12,28 0,28 C-12,28 -22,16 -22,4 C-22,-8 -17,-20 -9,-33 C-6,-38 -3,-40 0,-40 Z"
          fill="url(#shine)"/>

    <!-- Highlight arc (reflection on droplet) -->
    <path d="M-10,-22 C-4,-32 4,-32 10,-22"
          fill="none" stroke="#e8d48b" stroke-width="1" stroke-linecap="round" opacity="0.6"/>

    <!-- Sparkle star (top-right) -->
    <g opacity="0.85">
      <line x1="26" y1="-48" x2="26" y2="-60" stroke="#e8d48b" stroke-width="1.4" stroke-linecap="round"/>
      <line x1="20" y1="-54" x2="32" y2="-54" stroke="#e8d48b" stroke-width="1.4" stroke-linecap="round"/>
      <line x1="22" y1="-60" x2="30" y2="-48" stroke="#e8d48b" stroke-width="0.7" stroke-linecap="round" opacity="0.5"/>
      <line x1="30" y1="-60" x2="22" y2="-48" stroke="#e8d48b" stroke-width="0.7" stroke-linecap="round" opacity="0.5"/>
    </g>
    <!-- Small accent sparkle -->
    <g opacity="0.5">
      <line x1="36" y1="-38" x2="36" y2="-44" stroke="#dfc06a" stroke-width="0.8" stroke-linecap="round"/>
      <line x1="33" y1="-41" x2="39" y2="-41" stroke="#dfc06a" stroke-width="0.8" stroke-linecap="round"/>
    </g>
  </g>

  <!-- === TEXT: GLOSS LABS === -->
  <text x="108" y="102" fill="url(#gold)"
        font-family="'Didot', 'Bodoni MT', 'Playfair Display', 'Garamond', 'Georgia', serif"
        font-size="68" font-weight="400" letter-spacing="18" filter="url(#glow)">GLOSS LABS</text>

  <!-- Thin gold rule -->
  <line x1="112" y1="116" x2="608" y2="116" stroke="url(#gold)" stroke-width="0.5" opacity="0.4"/>

  <!-- Tagline -->
  <text x="360" y="140" fill="#c9a84c"
        font-family="'Didot', 'Bodoni MT', 'Playfair Display', 'Garamond', 'Georgia', serif"
        font-size="12.5" font-weight="300" letter-spacing="7" text-anchor="middle" opacity="0.65">MOBILE AUTO DETAILING</text>
</svg>