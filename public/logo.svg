<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 160" width="600" height="160">
  <defs>
    <linearGradient id="chrome" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E2E8F0"/>
      <stop offset="25%" stop-color="#CBD5E1"/>
      <stop offset="50%" stop-color="#F1F5F9"/>
      <stop offset="75%" stop-color="#94A3B8"/>
      <stop offset="100%" stop-color="#CBD5E1"/>
    </linearGradient>
    <linearGradient id="accentLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3B82F6" stop-opacity="0"/>
      <stop offset="20%" stop-color="#3B82F6"/>
      <stop offset="80%" stop-color="#60A5FA"/>
      <stop offset="100%" stop-color="#60A5FA" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="glMonogram" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#60A5FA"/>
      <stop offset="40%" stop-color="#3B82F6"/>
      <stop offset="100%" stop-color="#2563EB"/>
    </linearGradient>
    <filter id="softGlow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- GL Monogram Mark -->
  <g transform="translate(52, 80)" filter="url(#softGlow)">
    <!-- Outer hexagonal frame -->
    <path d="M0,-42 L36,-21 L36,21 L0,42 L-36,21 L-36,-21 Z"
          fill="none" stroke="url(#glMonogram)" stroke-width="1.5" opacity="0.4"/>
    <!-- Inner hexagonal frame -->
    <path d="M0,-32 L28,-16 L28,16 L0,32 L-28,16 L-28,-16 Z"
          fill="none" stroke="url(#glMonogram)" stroke-width="0.8" opacity="0.2"/>

    <!-- Stylized G -->
    <text x="-14" y="8" fill="url(#glMonogram)"
          font-family="'Bodoni Moda', 'Didot', 'Bodoni MT', Georgia, serif"
          font-size="38" font-weight="700" letter-spacing="-2">G</text>
    <!-- Stylized L -->
    <text x="6" y="8" fill="url(#chrome)"
          font-family="'Bodoni Moda', 'Didot', 'Bodoni MT', Georgia, serif"
          font-size="38" font-weight="400" letter-spacing="-2">L</text>

    <!-- Accent dot -->
    <circle cx="28" cy="-28" r="2" fill="#60A5FA" opacity="0.8"/>
    <circle cx="28" cy="-28" r="4" fill="#60A5FA" opacity="0.15"/>
  </g>

  <!-- GLOSS LABS text -->
  <text x="108" y="88" fill="url(#chrome)"
        font-family="'Bodoni Moda', 'Didot', 'Bodoni MT', 'Playfair Display', Georgia, serif"
        font-size="64" font-weight="400" letter-spacing="16" filter="url(#softGlow)">GLOSS LABS</text>

  <!-- Accent rule -->
  <line x1="112" y1="104" x2="575" y2="104" stroke="url(#accentLine)" stroke-width="0.7"/>

  <!-- Tagline -->
  <text x="344" y="132" fill="#94A3B8"
        font-family="'Jost', 'Helvetica Neue', sans-serif"
        font-size="11" font-weight="300" letter-spacing="6" text-anchor="middle">IT'S NOT CLEAN UNTIL IT'S GLOSSED</text>
</svg>
