<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 120" width="520" height="120">
  <defs>
    <!-- Water droplet gradients -->
    <radialGradient id="dropBg" cx="45%" cy="35%" r="55%">
      <stop offset="0%" stop-color="#E8F4FF"/>
      <stop offset="30%" stop-color="#B8D8F8"/>
      <stop offset="60%" stop-color="#6BA3D6"/>
      <stop offset="100%" stop-color="#1A5276"/>
    </radialGradient>
    <radialGradient id="highlight" cx="35%" cy="25%" r="30%">
      <stop offset="0%" stop-color="white" stop-opacity="0.95"/>
      <stop offset="50%" stop-color="white" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="highlight2" cx="60%" cy="70%" r="20%">
      <stop offset="0%" stop-color="white" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="carGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0A2540" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#1A5276" stop-opacity="0.3"/>
    </linearGradient>
    <!-- Text gradients -->
    <linearGradient id="chrome" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8B9DB8"/>
      <stop offset="20%" stop-color="#D4DCE8"/>
      <stop offset="40%" stop-color="#F0F4F8"/>
      <stop offset="50%" stop-color="#B8C8D8"/>
      <stop offset="65%" stop-color="#E8EEF4"/>
      <stop offset="80%" stop-color="#D0D8E4"/>
      <stop offset="100%" stop-color="#8B9DB8"/>
    </linearGradient>
    <linearGradient id="accentBlue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#60A5FA"/>
      <stop offset="50%" stop-color="#3B82F6"/>
      <stop offset="100%" stop-color="#1D4ED8"/>
    </linearGradient>
    <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3B82F6" stop-opacity="0"/>
      <stop offset="15%" stop-color="#3B82F6" stop-opacity="0.5"/>
      <stop offset="50%" stop-color="#60A5FA"/>
      <stop offset="85%" stop-color="#3B82F6" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#3B82F6" stop-opacity="0"/>
    </linearGradient>
    <filter id="dropShadow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="innerDepth">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="textGlow">
      <feGaussianBlur stdDeviation="0.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="dropClip">
      <path d="M50,8 Q50,8 35,38 C23,56 23,68 50,94 C77,68 77,56 65,38 Q50,8 50,8 Z"/>
    </clipPath>
  </defs>

  <!-- === WATER DROPLET ICON === -->
  <g transform="translate(0, 8)">
    <!-- Drop shadow on surface -->
    <ellipse cx="50" cy="98" rx="15" ry="3.5" fill="#1A5276" opacity="0.15"/>

    <!-- Main droplet body -->
    <path d="M50,8 Q50,8 35,38 C23,56 23,68 50,94 C77,68 77,56 65,38 Q50,8 50,8 Z"
          fill="url(#dropBg)" filter="url(#dropShadow)"/>

    <!-- Edge ring -->
    <path d="M50,8 Q50,8 35,38 C23,56 23,68 50,94 C77,68 77,56 65,38 Q50,8 50,8 Z"
          fill="none" stroke="white" stroke-width="0.7" opacity="0.3"/>

    <!-- Car silhouette reflected inside -->
    <g clip-path="url(#dropClip)" opacity="0.55">
      <line x1="25" y1="62" x2="75" y2="62" stroke="#0A2540" stroke-width="0.4" opacity="0.3"/>
      <g transform="translate(50, 62) scale(0.7)" filter="url(#innerDepth)">
        <path d="M-26,0 L-24,-2 L-18,-3 L-12,-3 L-8,-10 L-2,-12 L8,-12 L16,-10 L20,-4 L24,-3 L26,-2 L26,0 Z"
              fill="#0A2540" opacity="0.7"/>
        <path d="M-6,-10 L-2,-12 L8,-12 L12,-10 Z"
              fill="#3B82F6" opacity="0.3"/>
        <circle cx="-16" cy="0" r="4" fill="#0A2540" opacity="0.6"/>
        <circle cx="-16" cy="0" r="2" fill="#1A5276" opacity="0.4"/>
        <circle cx="18" cy="0" r="4" fill="#0A2540" opacity="0.6"/>
        <circle cx="18" cy="0" r="2" fill="#1A5276" opacity="0.4"/>
        <path d="M-26,0 L-24,2 L-18,3 L-12,3 L-8,6 L-2,7 L8,7 L16,6 L20,3 L24,3 L26,2 L26,0 Z"
              fill="#0A2540" opacity="0.12"/>
      </g>
    </g>

    <!-- Glossy highlights -->
    <ellipse cx="40" cy="30" rx="12" ry="15" fill="url(#highlight)" transform="rotate(-15, 40, 30)"/>
    <ellipse cx="37" cy="24" rx="3.5" ry="5" fill="white" opacity="0.7" transform="rotate(-15, 37, 24)"/>
    <ellipse cx="58" cy="74" rx="7" ry="5" fill="url(#highlight2)"/>
  </g>

  <!-- === TYPOGRAPHY === -->
  <!-- GLOSS -->
  <text x="110" y="55" fill="url(#chrome)"
        font-family="'Bodoni Moda', 'Didot', 'Playfair Display', Georgia, serif"
        font-size="50" font-weight="700" letter-spacing="10" filter="url(#textGlow)">GLOSS</text>

  <!-- Chrome separator -->
  <line x1="360" y1="22" x2="360" y2="65" stroke="url(#chrome)" stroke-width="0.5" opacity="0.25"/>

  <!-- LABS in blue -->
  <text x="376" y="55" fill="url(#accentBlue)"
        font-family="'Bodoni Moda', 'Didot', 'Playfair Display', Georgia, serif"
        font-size="50" font-weight="400" letter-spacing="10">LABS</text>

  <!-- Accent underline -->
  <line x1="110" y1="68" x2="510" y2="68" stroke="url(#lineGrad)" stroke-width="0.6"/>

  <!-- Tagline -->
  <text x="310" y="86" fill="#64748B" text-anchor="middle"
        font-family="'Jost', 'Helvetica Neue', sans-serif"
        font-size="8.5" font-weight="300" letter-spacing="4.5">IT'S NOT CLEAN TILL IT'S GLOSS</text>
</svg>