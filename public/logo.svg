<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 100" width="480" height="100">
  <defs>
    <linearGradient id="textMain" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#F1F5F9"/>
      <stop offset="100%" stop-color="#E2E8F0"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3B82F6"/>
      <stop offset="100%" stop-color="#60A5FA"/>
    </linearGradient>
    <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3B82F6" stop-opacity="0"/>
      <stop offset="20%" stop-color="#3B82F6"/>
      <stop offset="80%" stop-color="#60A5FA"/>
      <stop offset="100%" stop-color="#60A5FA" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- G monogram mark -->
  <g transform="translate(44, 50)">
    <!-- Outer circle (broken/open) -->
    <path d="M0,-38 A38,38 0 1,1 -5,-38" fill="none" stroke="url(#accentGrad)" stroke-width="3" stroke-linecap="round"/>
    <!-- Inner crossbar of G -->
    <line x1="2" y1="0" x2="22" y2="0" stroke="url(#accentGrad)" stroke-width="3" stroke-linecap="round"/>
    <!-- Shine dot -->
    <circle cx="26" cy="-28" r="2.5" fill="#60A5FA" opacity="0.7"/>
    <circle cx="26" cy="-28" r="1" fill="white" opacity="0.9"/>
  </g>

  <!-- GLOSS text -->
  <text x="100" y="52" fill="url(#textMain)"
        font-family="'Bodoni Moda', 'Didot', 'Playfair Display', Georgia, serif"
        font-size="52" font-weight="700" letter-spacing="8">GLOSS</text>

  <!-- LABS text -->
  <text x="355" y="52" fill="url(#accentGrad)"
        font-family="'Bodoni Moda', 'Didot', 'Playfair Display', Georgia, serif"
        font-size="52" font-weight="300" letter-spacing="8">LABS</text>

  <!-- Accent underline -->
  <line x1="100" y1="64" x2="470" y2="64" stroke="url(#lineGrad)" stroke-width="0.8"/>

  <!-- Tagline -->
  <text x="285" y="82" fill="#94A3B8" text-anchor="middle"
        font-family="'Jost', 'Helvetica Neue', sans-serif"
        font-size="9" font-weight="300" letter-spacing="5">PREMIUM AUTO DETAILING</text>
</svg>
